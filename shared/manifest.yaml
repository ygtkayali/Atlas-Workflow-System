shared:
  version: 0.1.0
  description: Shared Atlas assets reused across modes.

source_assets:
  root: shared
  skills: skills
  tools: tools

managed_skills:
  install_scope: global
  items:
    - id: note-search
      source: skills/note-search
      required: true

managed_tools:
  install_scope: global
  items:
    - id: local_note_search
      source: tools/local_note_search.py
      install_name: local_note_search.py
      required: true
    - id: local_note_semantic_search
      source: tools/local_note_semantic_search.py
      install_name: local_note_semantic_search.py
      required: true

health_checks:
  report_only: true
  checks:
    - id: shared-source-asset-folders-present
      type: paths_exist
      targets:
        - shared/skills
        - shared/tools
      severity: error
    - id: shared-skills-installed
      type: per_platform_skill_paths_exist
      severity: warning
    - id: shared-tools-installed
      type: per_platform_tool_paths_exist
      severity: warning

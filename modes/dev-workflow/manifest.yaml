mode:
  name: dev-workflow
  version: 0.1.0
  description: Technical project workflow mode for clarification, note management, planning, implementation, verification, review, and documentation sync.

source_assets:
  root: modes/dev-workflow
  templates: docs/Templates
  starter_notes: docs/Main Hubs
  tags: docs/Tags
  skills: skills
  tools: tools

vault:
  default_name: docs
  default_path: docs
  folders:
    - path: Idea Backlog
      purpose: Draft project and workflow ideas waiting for clarification, planning, promotion, implementation, or discard.
    - path: Durable Notes
      purpose: Settled or evolving project knowledge notes.
    - path: In-flight
      purpose: Primary workflow-state folder for open task lanes, handoffs, packets, implementation reports, review artifacts, and other hard-gate artifacts that must survive session compaction.
    - path: Archieved
      purpose: Historical workflow and note material retained after closeout.
    - path: Archieved/Tasks
      purpose: Distilled closeout summaries and archived workflow task artifacts.
    - path: Archieved/Notes
      purpose: Archived notes retained for historical reference.
    - path: Templates
      purpose: Reusable note and artifact templates.
    - path: Tags
      purpose: Linked status and classification tags.
    - path: Main Hubs
      purpose: Lightweight index hubs for the workflow surface.

agent_bridge:
  source: agents-bridge.md
  purpose: Prepend the dev-workflow runtime contract to each platform's agent file, preserving project-specific instructions below the managed block.

managed_files:
  - id: atlas-config
    source: atlas.yaml
    target: atlas.yaml
    required: true
    sync: create_if_missing
    protect_existing: true
    purpose: Record the active mode, configured vault path, and managed asset inventory for a project.

managed_templates:
  - id: idea-note-template
    source: docs/Templates/Idea Note Template.md
    target: Templates/Idea Note Template.md
    required: true
  - id: project-subject-template
    source: docs/Templates/Feature Subject Template.md
    target: Templates/Feature Subject Template.md
    required: true
  - id: design-note-template
    source: docs/Templates/Design Note Template.md
    target: Templates/Design Note Template.md
    required: true
  - id: task-archive-summary-template
    source: docs/Templates/Task Archive Summary Template.md
    target: Templates/Task Archive Summary Template.md
    required: true

managed_starter_notes:
  - id: context-map
    source: docs/context-map.md
    target: context-map.md
    required: true
    sync: create_if_missing
  - id: vocabulary
    source: docs/vocabulary.md
    target: vocabulary.md
    required: true
  - id: workflow-schemas-hub
    source: docs/Main Hubs/Workflow Schemas Hub.md
    target: Main Hubs/Workflow Schemas Hub.md
    required: true

managed_tags:
  - id: design-note
    source: docs/Tags/design-note.md
    target: Tags/design-note.md
    required: true
  - id: feature-subject-note
    source: docs/Tags/feature-subject-note.md
    target: Tags/feature-subject-note.md
    required: true
  - id: idea-note
    source: docs/Tags/idea-note.md
    target: Tags/idea-note.md
    required: true
  - id: priority-high
    source: docs/Tags/priority-high.md
    target: Tags/priority-high.md
    required: true
  - id: priority-mid
    source: docs/Tags/priority-mid.md
    target: Tags/priority-mid.md
    required: true
  - id: priority-low
    source: docs/Tags/priority-low.md
    target: Tags/priority-low.md
    required: true
  - id: status-active
    source: docs/Tags/status-active.md
    target: Tags/status-active.md
    required: true
  - id: status-draft
    source: docs/Tags/status-draft.md
    target: Tags/status-draft.md
    required: true
  - id: status-pending
    source: docs/Tags/status-pending.md
    target: Tags/status-pending.md
    required: true
  - id: status-settled
    source: docs/Tags/status-settled.md
    target: Tags/status-settled.md
    required: true
  - id: status-archived
    source: docs/Tags/status-archived.md
    target: Tags/status-archived.md
    required: true

managed_skills:
  global_sync_command: atlas skills sync --mode dev-workflow
  install_scope: global
  sync_separate_from_project_init: true
  items:
    - id: dw-clarify-intent
      source: skills/dw-clarify-intent
      required: true
    - id: dw-note-manager
      source: skills/dw-note-manager
      required: true
    - id: project-planner
      source: skills/project-planner
      required: true
    - id: project-implementer
      source: skills/project-implementer
      required: true
    - id: implementation-verifier
      source: skills/implementation-verifier
      required: true
    - id: project-review-sync
      source: skills/project-review-sync
      required: true

managed_tools:
  install_scope: mode_specific
  items: []

health_checks:
  report_only: true
  checks:
    - id: manifest-yaml-valid
      type: yaml_parse
      target: modes/dev-workflow/manifest.yaml
      severity: error
    - id: source-asset-folders-present
      type: paths_exist
      targets:
        - modes/dev-workflow/docs/Templates
        - modes/dev-workflow/docs/Main Hubs
        - modes/dev-workflow/docs/Tags
        - modes/dev-workflow/skills
        - modes/dev-workflow/tools
      severity: error
    - id: project-atlas-config-present
      type: file_exists
      target: atlas.yaml
      severity: warning
    - id: local-agent-bridges
      type: per_platform_agent_file_policy
      policy: create_if_missing_or_prepend_bridge_with_explicit_sync_approval
      severity: error
    - id: vault-folders-present
      type: paths_exist
      targets_from: vault.folders
      severity: warning
    - id: managed-skills-installed
      type: per_platform_skill_paths_exist
      severity: warning
    - id: managed-tools-installed
      type: per_platform_tool_paths_exist
      severity: warning

sync_policy:
  health_check_mutates_files: false
  project_init_installs_global_skills: false
  global_skill_sync_command: atlas skills sync --mode dev-workflow
  project_sync_command: atlas sync
  project_sync_requires_explicit_approval: true
  approval_granularity: whole_sync_run
  prepend_existing_agent_files: all_project_platforms
  never_overwrite_agent_files_without_explicit_approval: true
  existing_agent_file_behavior: create_if_missing_or_prepend_bridge_after_sync_approval
  allowed_project_sync_actions:
    - create_missing_managed_files
    - prepend_bridge_to_platform_agent_files
    - create_missing_vault_folders
    - update_managed_tools_after_approval
    - update_managed_templates_after_approval
    - update_managed_starter_notes_after_approval
    - update_managed_tags_after_approval
  disallowed_implicit_actions:
    - replace_existing_agent_files
    - install_global_skills_during_project_init
    - mutate_files_during_health_check
    - update_unmanaged_project_notes
